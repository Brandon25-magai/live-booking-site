<section id="contact" class="section-block contact-wrap">

  <div class="container contact-grid">

    <div>
      <h2>Request Service</h2>

      <p>For immediate help, call or text now. For non-urgent jobs, use this form.</p>

      <p><strong>Phone/Text:</strong>
      <a href="tel:+18153100817">(815) 310-0817</a></p>

      <p><strong>Email:</strong>
      <a href="mailto:Brandon@satosalltradesolutions.com">
      Brandon@satosalltradesolutions.com
      </a></p>
    </div>

    <form
      class="contact-form"
      name="service-request"
      method="POST"
      action="/thank-you.html"
      data-netlify="true"
      netlify-honeypot="bot-field"
    >

      <input type="hidden" name="form-name" value="service-request">

      <p class="hidden-field" hidden>
        <label>Don’t fill this out if you're human: <input name="bot-field"></label>
      </p>

      <label>Name</label>
      <input name="name" required>

      <label>Phone</label>
      <input name="phone" type="tel" required>

      <label>Truck or Equipment Type</label>
      <input name="equipment_type" required>

      <label>Is the truck or equipment still running?</label>
      <select name="truck_status" required>
        <option value="">Select one</option>
        <option value="running">Yes, still running</option>
        <option value="not-running">No, not running</option>
        <option value="derated">Running but derated</option>
      </select>

      <label>Current Location</label>
      <input name="current_location" required>

      <label>Issue Summary</label>
      <textarea name="issue_summary" rows="4" required></textarea>

      <button class="btn btn-primary" type="submit">
        Send Service Request
      </button>

    </form>
  </div>
</section>
