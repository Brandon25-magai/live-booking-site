<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Sato's All Trade Solutions LLC</title>
  <meta
    name="description"
    content="Request mobile truck, trailer, and equipment repair from Sato's All Trade Solutions LLC in Lena, IL and surrounding areas."
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="brand">
        <img src="assets/satos-logo.svg" alt="Sato's All Trade Solutions LLC logo">
      </a>

      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
      </nav>

      <a class="call-pill" href="tel:+18153100817">24/7 Call / Text: (815) 310-0817</a>
    </div>
  </header>

  <main>
    <section class="section-block contact-wrap">
      <div class="container contact-grid">
        <div>
          <h1>Request Service</h1>
          <p>For immediate help, call or text now. For non-urgent jobs, use this form.</p>

          <p><strong>Phone/Text:</strong>
            <a href="tel:+18153100817">(815) 310-0817</a>
          </p>

          <p><strong>Email:</strong>
            <a href="mailto:Brandon@satosalltradesolutions.com">
              Brandon@satosalltradesolutions.com
            </a>
          </p>
        </div>

        <form
          class="contact-form"
          name="service-request"
          method="POST"
          action="/thank-you.html"
          data-netlify="true"
          netlify-honeypot="bot-field"
        >
          <input type="hidden" name="form-name" value="service-request">

          <p class="hidden-field" hidden>
            <label>Don’t fill this out if you're human: <input name="bot-field"></label>
          </p>

          <label for="name">Name</label>
          <input id="name" name="name" required>

          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" required>

          <label for="equipment_type">Truck or Equipment Type</label>
          <input id="equipment_type" name="equipment_type" required>

          <label for="truck_status">Is the truck or equipment still running?</label>
          <select id="truck_status" name="truck_status" required>
            <option value="">Select one</option>
            <option value="running">Yes, still running</option>
            <option value="not-running">No, not running</option>
            <option value="derated">Running but derated</option>
          </select>

          <label for="current_location">Current Location</label>
          <input id="current_location" name="current_location" required>

          <label for="issue_summary">Issue Summary</label>
          <textarea id="issue_summary" name="issue_summary" rows="4" required></textarea>

          <button class="btn btn-primary" type="submit">
            Send Service Request
          </button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
