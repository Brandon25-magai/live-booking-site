<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Subtle broken-down semi truck with hood up background">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#15161b"/>
      <stop offset="100%" stop-color="#111217"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="1">
      <stop offset="0%" stop-color="#3f434d"/>
      <stop offset="100%" stop-color="#2e323a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- road band -->
  <rect x="0" y="610" width="1600" height="190" fill="#1a1c22" opacity="0.6"/>

  <!-- broken down semi: trailer -->
  <g opacity="0.62" filter="url(#soft)">
    <rect x="170" y="410" width="610" height="150" rx="12" fill="url(#steel)"/>
    <rect x="760" y="450" width="26" height="110" rx="4" fill="#404550"/>

    <!-- tractor body -->
    <rect x="795" y="430" width="205" height="130" rx="10" fill="url(#steel)"/>
    <rect x="905" y="385" width="125" height="75" rx="9" fill="#4a505d"/>
    <rect x="920" y="400" width="45" height="28" rx="4" fill="#697386" opacity="0.8"/>

    <!-- hood up -->
    <polygon points="998,438 1088,365 1132,377 1054,470" fill="#5d6474"/>
    <polygon points="1006,445 1078,387 1096,392 1032,452" fill="#7a8395" opacity="0.7"/>

    <!-- smoke from engine bay -->
    <g fill="#8a8f99" opacity="0.28">
      <circle cx="1118" cy="332" r="18"/>
      <circle cx="1146" cy="307" r="23"/>
      <circle cx="1178" cy="280" r="28"/>
    </g>

    <!-- warning triangle near truck -->
    <polygon points="1165,605 1195,555 1225,605" fill="none" stroke="#ff9d1a" stroke-width="8" opacity="0.75"/>

    <!-- wheels -->
    <g>
      <circle cx="300" cy="575" r="42" fill="#242830"/><circle cx="300" cy="575" r="19" fill="#4f5666"/>
      <circle cx="430" cy="575" r="42" fill="#242830"/><circle cx="430" cy="575" r="19" fill="#4f5666"/>
      <circle cx="575" cy="575" r="42" fill="#242830"/><circle cx="575" cy="575" r="19" fill="#4f5666"/>
      <circle cx="840" cy="575" r="40" fill="#242830"/><circle cx="840" cy="575" r="18" fill="#4f5666"/>
      <circle cx="948" cy="575" r="40" fill="#242830"/><circle cx="948" cy="575" r="18" fill="#4f5666"/>
    </g>
  </g>

  <!-- subtle industrial accents -->
  <rect x="0" y="0" width="1600" height="6" fill="#3c2b10" opacity="0.5"/>
  <rect x="0" y="894" width="1600" height="6" fill="#3c2b10" opacity="0.5"/>
</svg>
